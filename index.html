<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>International Brotherhood of Hoodsters - Local 4663</title>
    <link rel="icon" href="IBHlogo.png" type="image/png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono&display=swap');

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Roboto Mono', monospace;
        }

        .jacket {
            max-width: min(420px, 70vw);
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.3s ease;
            user-select: none;
        }

        .jacket:hover {
            transform: scale(1.03);
        }

        a.join {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-top: 32px;
            background: #8b0000;
            color: #d4af37;
            padding: 16px 48px;
            font-size: 20px;
            font-family: 'Roboto Mono', monospace;
            letter-spacing: 0.04em;
            border: none;
            cursor: pointer;
            transition: background 0.2s ease;
            min-width: 280px;
            text-decoration: none;
            text-align: center;
        }

        a.join:hover,
        a.join:focus-visible {
            background: #a00000;
            outline: none;
        }
    </style>
</head>
<body>
    <img src="IBHjacket-20260721b.png" class="jacket" alt="Union Jacket">

    <!-- Always use /pledge on this domain — never pledge.local4663.com -->
    <a class="join" id="join-btn" href="https://local4663.com/pledge">
        JOIN LOCAL 4663
    </a>

    <script>
        (function () {
            var btn = document.getElementById('join-btn');
            if (!btn) return;
            var target = 'https://local4663.com/pledge';
            btn.setAttribute('href', target);
            btn.addEventListener('click', function (e) {
                e.preventDefault();
                window.location.assign(target);
            });
        })();
    </script>
</body>
</html>
