<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pledge Tribute — Local 4663</title>
    <link rel="icon" href="IBHlogo.png" type="image/png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono&display=swap');

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            background: #ffffff;
            min-height: 100vh;
        }

        body {
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Roboto Mono', monospace;
        }

        .back {
            position: fixed;
            top: 24px;
            left: 24px;
            color: #8b0000;
            font-size: 14px;
            text-decoration: none;
            opacity: 0.85;
            z-index: 2;
        }

        .back:hover {
            opacity: 1;
        }

        .panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: min(440px, 100%);
            width: 100%;
        }

        .member-card {
            width: 100%;
            height: auto;
            display: block;
            user-select: none;
            background: transparent;
            /* White PNG canvas multiplies to invisible on white page — no rectangular outline */
            mix-blend-mode: multiply;
        }

        /* Launch mode: hover swaps label to Coming Soon; no wallet */
        button.cta {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-top: 24px;
            background: #8b0000;
            color: #d4af37;
            padding: 16px 48px;
            font-size: 20px;
            font-family: 'Roboto Mono', monospace;
            letter-spacing: 0.04em;
            border: none;
            cursor: pointer;
            transition: background 0.2s ease;
            min-width: 280px;
            width: 100%;
            max-width: 360px;
            text-align: center;
        }

        button.cta:hover,
        button.cta:focus-visible {
            background: #a00000;
            outline: none;
        }

        button.cta .label-soon {
            display: none;
        }

        button.cta:hover .label-default,
        button.cta:focus-visible .label-default {
            display: none;
        }

        button.cta:hover .label-soon,
        button.cta:focus-visible .label-soon {
            display: inline;
        }
    </style>
</head>
<body>
    <a class="back" href="https://local4663.com/">← LOCAL 4663</a>

    <div class="panel">
        <img
            src="IBHmembercard.png?v=multiply"
            class="member-card"
            alt="International Brotherhood of Hoodsters membership card"
        >

        <button type="button" class="cta" id="pledge-btn" aria-label="Pledge Tribute — Coming Soon">
            <span class="label-default">PLEDGE TRIBUTE</span>
            <span class="label-soon">COMING SOON</span>
        </button>
    </div>

    <script>
        // Launch mode: no presale wallet — button is visual only
        document.getElementById('pledge-btn').addEventListener('click', function (e) {
            e.preventDefault();
        });
    </script>
</body>
</html>
