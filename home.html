<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local 4663 — Union Hall</title>
    <link rel="icon" href="HoodstersLogoWhite.png" type="image/png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;700&family=Roboto+Mono&display=swap');

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background: #1a140f;
            color: #d4af37;
            font-family: 'EB Garamond', serif;
            min-height: 100vh;
        }

        .back {
            position: absolute;
            top: 24px;
            left: 24px;
            z-index: 3;
            color: #d4af37;
            font-family: 'Roboto Mono', monospace;
            font-size: 14px;
            text-decoration: none;
            opacity: 0.85;
        }

        .back:hover {
            opacity: 1;
        }

        .hero {
            position: relative;
            width: 100%;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .hero-image {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            z-index: 0;
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(26,20,15,0.4), rgba(26,20,15,0.85));
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 2;
            text-align: center;
            max-width: 720px;
            padding: 40px;
        }

        .site-logo {
            max-width: 380px;
            width: 100%;
            height: auto;
            margin-bottom: 20px;
            border: 8px solid #b38b4d;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>
    <a class="back" href="index.html">← LANDING</a>
    <section class="hero">
        <img src="IBHposter.png" class="hero-image" alt="Union Hall poster">
        <div class="overlay"></div>

        <div class="content">
            <img src="HoodstersLogoWhite.png" class="site-logo" alt="International Brotherhood of Hoodsters">

            <h2 style="font-size: 2.4em; margin: 10px 0; text-shadow: 3px 3px 0 #000;">LOCAL 4663</h2>
            <p style="font-size: 1.3em; margin: 10px 0 30px;">EST. 2026 • BUILT BY THE WORKERS • POWERED BY THE PEOPLE</p>

            <p style="margin-top: 30px; font-size: 1.1em; opacity: 0.9;">
                CONNECT YOUR WALLET TO ENLIST<br>
                <span style="font-size: 0.9em;">NO INSIDERS. NO SCABS. JUST HOODSTERS.</span>
            </p>
        </div>
    </section>

    <script>
        console.log("%cLocal 4663 - International Brotherhood of Hoodsters. Welcome to the Union Hall.", "color: #d4af37");
    </script>
</body>
</html>
